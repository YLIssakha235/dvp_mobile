services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: my-better-t-app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "4173:4173"
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/my-better-t-app"
    depends_on:
      - postgres

volumes:
  postgres_data:
